version: 2
project_name: radio

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: radio
    env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/pedrosousa13/radio/internal/app.version={{.Version}}

archives:
  - id: default
    # tar.gz everywhere except Windows, which gets a .zip
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - repository:
      owner: pedrosousa13
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/pedrosousa13/radio"
    description: "Ethical, privacy-minded radios-of-the-world TUI"
    license: "MIT"
    binaries:
      - radio
    dependencies:
      - formula: mpv
    hooks:
      post:
        # Strip the quarantine flag so the unsigned binary runs without a Gatekeeper prompt.
        install: |
          if OS.mac? && File.exist?("#{staged_path}/radio")
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/radio"]
          end

scoops:
  - repository:
      owner: pedrosousa13
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    homepage: "https://github.com/pedrosousa13/radio"
    description: "Ethical, privacy-minded radios-of-the-world TUI"
    license: MIT
    # Scoop can't force an mpv dependency the way Homebrew does; the README
    # tells Windows users to `scoop install mpv`. The app also prints a clear
    # "install mpv" message if it is missing.

release:
  prerelease: auto
